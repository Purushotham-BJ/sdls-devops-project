# ============================================================
# Smart Distributed Logging System — Production Docker Compose
# Build context is ./backend for ALL services so that the
# shared/ folder is accessible inside every Dockerfile.
# ============================================================
version: "3.9"

x-service-defaults: &service-defaults
  restart: always
  networks:
    - sdls-net
  env_file:
    - .env
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    <<: *service-defaults
    image: mongo:7.0
    container_name: sdls-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./backend/database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Logging Service ────────────────────────────────────────────────────────
  logging-service:
    <<: *service-defaults
    build:
      context: ./backend                        # <-- whole backend/ is the context
      dockerfile: logging-service/Dockerfile    # <-- relative to context
    image: ${DOCKERHUB_REPO_PREFIX:-sdls}/logging-service:${IMAGE_TAG:-latest}
    container_name: sdls-logging
    ports:
      - "${LOGGING_SERVICE_PORT:-5005}:5005"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - LOGGING_SERVICE_PORT=5005
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5005/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Inventory Service ──────────────────────────────────────────────────────
  inventory-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: inventory-service/Dockerfile
    image: ${DOCKERHUB_REPO_PREFIX:-sdls}/inventory-service:${IMAGE_TAG:-latest}
    container_name: sdls-inventory
    ports:
      - "${INVENTORY_SERVICE_PORT:-5003}:5003"
    environment:
      - LOGGING_SERVICE_URL=http://logging-service:5005
      - INVENTORY_SERVICE_PORT=5003
    depends_on:
      logging-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Payment Service ────────────────────────────────────────────────────────
  payment-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: payment-service/Dockerfile
    image: ${DOCKERHUB_REPO_PREFIX:-sdls}/payment-service:${IMAGE_TAG:-latest}
    container_name: sdls-payment
    ports:
      - "${PAYMENT_SERVICE_PORT:-5002}:5002"
    environment:
      - LOGGING_SERVICE_URL=http://logging-service:5005
      - PAYMENT_SERVICE_PORT=5002
    depends_on:
      logging-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Notification Service ───────────────────────────────────────────────────
  notification-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    image: ${DOCKERHUB_REPO_PREFIX:-sdls}/notification-service:${IMAGE_TAG:-latest}
    container_name: sdls-notification
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-5004}:5004"
    environment:
      - LOGGING_SERVICE_URL=http://logging-service:5005
      - NOTIFICATION_SERVICE_PORT=5004
    depends_on:
      logging-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Order Service ──────────────────────────────────────────────────────────
  order-service:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    image: ${DOCKERHUB_REPO_PREFIX:-sdls}/order-service:${IMAGE_TAG:-latest}
    container_name: sdls-order
    ports:
      - "${ORDER_SERVICE_PORT:-5001}:5001"
    environment:
      - LOGGING_SERVICE_URL=http://logging-service:5005
      - PAYMENT_SERVICE_URL=http://payment-service:5002
      - INVENTORY_SERVICE_URL=http://inventory-service:5003
      - NOTIFICATION_SERVICE_URL=http://notification-service:5004
      - ORDER_SERVICE_PORT=5001
    depends_on:
      logging-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    <<: *service-defaults
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    image: ${DOCKERHUB_REPO_PREFIX:-sdls}/api-gateway:${IMAGE_TAG:-latest}
    container_name: sdls-gateway
    ports:
      - "${API_GATEWAY_PORT:-5000}:5000"
    environment:
      - ORDER_SERVICE_URL=http://order-service:5001
      - PAYMENT_SERVICE_URL=http://payment-service:5002
      - INVENTORY_SERVICE_URL=http://inventory-service:5003
      - LOGGING_SERVICE_URL=http://logging-service:5005
      - API_GATEWAY_PORT=5000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend Dashboard ─────────────────────────────────────────────────────
  dashboard:
    <<: *service-defaults
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    image: ${DOCKERHUB_REPO_PREFIX:-sdls}/dashboard:${IMAGE_TAG:-latest}
    container_name: sdls-dashboard
    ports:
      - "${DASHBOARD_PORT:-5006}:5006"
    environment:
      - API_GATEWAY_URL=http://api-gateway:5000
      - LOGGING_SERVICE_URL=http://logging-service:5005
      - DASHBOARD_PORT=5006
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5006/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mongo-data:
    driver: local

networks:
  sdls-net:
    driver: bridge
    name: sdls-network
