# ── payment-service ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: sdls
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      # Non-root security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: payment-service
          image: purushothambj/payment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: sdls-config
            - secretRef:
                name: sdls-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: sdls
spec:
  selector:
    app: payment-service
  ports:
    - port: 5002
      targetPort: 5002
  type: ClusterIP
---
# Horizontal Pod Autoscaler — scale up when CPU > 70%
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: sdls
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
